name: intelligent-customer-support-decision-system
version: 1.0.0
description: Multi-step RL environment for realistic customer support issue detection, clarification, resolution, and escalation decisions.
entrypoint: env:CustomerSupportEnv
factory: env:make_env
tasks:
  - easy
  - medium
  - hard
  - task_easy
  - task_medium
  - task_hard
observation_space:
  customer_query: string
  detected_issues: list[string]
  customer_type: enum[normal,premium]
  sentiment: enum[calm,angry]
  conversation_history: list[object]
  time_elapsed: int
  resolved: bool
  escalated: bool
hidden_state:
  true_issues: list[string]
action_space:
  type: enum[classify,ask,resolve,escalate]
  content: string
reward:
  range: [0.05, 0.95]
  type: trajectory-shaped
  description: Rewards correct issue detection, useful clarification, complete resolution, appropriate escalation, and efficiency; penalizes false classifications, premature resolution, unnecessary escalation, and excessive steps. Public rewards and grader scores are clamped to the strict non-binary interval (0, 1).
grader:
  module: graders.grader
  function: grade
task_graders:
  easy:
    module: graders.easy
    function: grade
  medium:
    module: graders.medium
    function: grade
  hard:
    module: graders.hard
    function: grade
  task_easy:
    module: graders.easy
    function: grade
  task_medium:
    module: graders.medium
    function: grade
  task_hard:
    module: graders.hard
    function: grade
