spec_version: 1
name: intelligent_customer_support_decision_system
description: Multi-step customer support coordination environment for realistic issue classification, clarification, escalation, and resolution.
version: 0.1.0
type: space
runtime: fastapi
app: server.app:app
port: 7860
action: Action
observation: Observation
tags:
  - openenv
  - customer-support
  - rl-environment
  - decision-making

graders:
  easy:
    type: python
    entrypoint: graders:grade_easy_episode
    ground_truth:
      task: easy
  medium:
    type: python
    entrypoint: graders:grade_medium_episode
    ground_truth:
      task: medium
  hard:
    type: python
    entrypoint: graders:grade_hard_episode
    ground_truth:
      task: hard

tasks:
  - id: easy
    difficulty: easy
    description: Resolve a clear duplicate billing charge for a normal customer.
    max_steps: 6
    ground_truth:
      true_issues:
        - billing_overcharge
    grader:
      type: python
      entrypoint: graders:grade_easy_episode
      score_range: [0.0, 1.0]
      score_key: score
      success_condition: returns a valid graded duplicate billing handling episode

  - id: medium
    difficulty: medium
    description: Handle a delayed order with address correction and refund request.
    max_steps: 8
    ground_truth:
      true_issues:
        - shipping_delay
        - address_correction
        - refund_request
    grader:
      type: python
      entrypoint: graders:grade_medium_episode
      score_range: [0.0, 1.0]
      score_key: score
      success_condition: returns a valid graded multi-issue fulfillment support episode

  - id: hard
    difficulty: hard
    description: Handle a premium angry customer with product defect, warranty claim, and account security risk.
    max_steps: 9
    ground_truth:
      true_issues:
        - product_defect
        - warranty_claim
        - account_security
    grader:
      type: python
      entrypoint: graders:grade_hard_episode
      score_range: [0.0, 1.0]
      score_key: score
      success_condition: returns a valid graded high-severity support coordination episode
